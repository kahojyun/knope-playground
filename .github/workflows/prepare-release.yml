name: Prepare Release

on:
  push:
    branches:
      - main

env:
  KNOPE_VERSION: 0.22.4

jobs:
  prepare-release:
    if: "!contains(github.event.head_commit.message, 'chore: prepare release')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - uses: knope-dev/action@v2.1.2
        with:
          version: ${{ env.KNOPE_VERSION }}

      - name: Check For Release Changes
        run: knope --dry-run plan-release --verbose | tee "$RUNNER_TEMP/knope-plan.txt"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Decide Whether To Release
        id: release-check
        run: |
          if grep -q "No packages to release" "$RUNNER_TEMP/knope-plan.txt"; then
            echo "No release changes detected."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Release PR
        if: steps.release-check.outputs.should_release == 'true'
        run: knope prepare-release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
