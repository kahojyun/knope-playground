name: Prepare Release

on:
  push:
    branches:
      - main

env:
  KNOPE_VERSION: 0.22.4

jobs:
  prepare-release:
    if: "!contains(github.event.head_commit.message, 'chore: prepare release')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - uses: knope-dev/action@v2.1.2
        with:
          version: ${{ env.KNOPE_VERSION }}

      - name: Check whether a release is needed
        id: plan
        run: |
          knope --dry-run plan-release > "$RUNNER_TEMP/knope-plan.txt"
          if [ -s "$RUNNER_TEMP/knope-plan.txt" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Prepare Release PR
        if: steps.plan.outputs.has_changes == 'true'
        run: knope prepare-release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
